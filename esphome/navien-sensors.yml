substitutions:
  sensor_suffix: ""

text_sensor:
  - platform: navien
    navien: navien_main
    name: "${friendly_name} Heating Mode"
    id: heating_mode
    heating_mode: true
  - platform: navien
    navien: navien_main
    name: "${friendly_name} Device Type"
    id: device_type
    device_type: true
  - platform: navien
    navien: navien_main
    name: "${friendly_name} Operating State"
    id: operating_state
    operating_state: true
  - platform: navien
    navien: navien_main
    name: "${friendly_name} Controller Version"
    id: controller_version
    controller_version: true
  - platform: navien
    navien: navien_main
    name: "${friendly_name} Panel Version"
    id: panel_version 
    panel_version: true

sensor:
  - platform: navien
    id: navien_main
    src: 0
    name: "${friendly_name} Metrics"
    uart_id: main_hw_uart
    dhw_set_temperature:
      id: navien_dhw_set_temperature
      name: "${friendly_name} DHW Set Temp${sensor_suffix}"
      filters:
        - lambda: return x * (9.0/5.0) + 32.0;
      unit_of_measurement: "°F"
    inlet_temperature:
      name: "${friendly_name} Inlet Temp${sensor_suffix}"
      filters:
        - lambda: return x * (9.0/5.0) + 32.0;
      unit_of_measurement: "°F"
    outlet_temperature:
      name: "${friendly_name} Outlet Temp${sensor_suffix}"
      filters:
        - lambda: return x * (9.0/5.0) + 32.0;
      unit_of_measurement: "°F"
    sh_set_temperature:
      name: "${friendly_name} SH Set Temp${sensor_suffix}"
      filters:
        - lambda: return x * (9.0/5.0) + 32.0;
      unit_of_measurement: "°F"
    sh_outlet_temperature:
      name: "${friendly_name} SH Outlet Temp${sensor_suffix}"
      filters:
        - lambda: return x * (9.0/5.0) + 32.0;
      unit_of_measurement: "°F"
    sh_return_temperature:
      name: "${friendly_name} SH Return Temp${sensor_suffix}"
      filters:
        - lambda: return x * (9.0/5.0) + 32.0;
      unit_of_measurement: "°F"
    outdoor_temperature:
      name: "${friendly_name} Outdoor Temp${sensor_suffix}"
      filters:
        - lambda: return x * (9.0/5.0) + 32.0;
      unit_of_measurement: "°F"
      disabled_by_default: true
    water_flow:
      name: "${friendly_name} Water Flow${sensor_suffix}"
      filters:
        - lambda: return x / 3.785;
      unit_of_measurement: "GPM"
    water_utilization:  
      name: "${friendly_name} Water Capacity Utilization${sensor_suffix}"
      unit_of_measurement: "%"
    heat_capacity:
      name: "${friendly_name} Heat Capacity${sensor_suffix}"
      unit_of_measurement: "%"
      accuracy_decimals: 1
    gas_total:
      id: gas_total_therms
      name: "${friendly_name} Accumulated Gas Usage${sensor_suffix}"
      # Navien reports accumulated gas in m³/10.
      # 1 m³ gas = 9131 kcal; 1 Therm = 25193 kcal.
      filters:
        - lambda: return x * 9131.0 / 25193.0 / 10.0;
      unit_of_measurement: "Therms"
      accuracy_decimals: 1
    gas_current:
      id: gas_current_btu
      name: "${friendly_name} Current Gas Usage${sensor_suffix}"
      # Navien reports instantaneous gas usage in 10x kcal/hr.
      # 1 kcal = 3.968 BTU; the 10x factor is confirmed by comparing
      # against the reported heat capacity percentage.
      filters:
        - lambda: return x * 3.9680;
      unit_of_measurement: "BTU"
      accuracy_decimals: 1
    total_dhw_usage:
      name: "${friendly_name} Total DHW Uses${sensor_suffix}"
      accuracy_decimals: 0
    total_operating_time:
      name: "${friendly_name} Total Operating Time${sensor_suffix}"
      unit_of_measurement: "H"
    total_dhw_usage_hours:
      name: "${friendly_name} Total DHW Operating Time${sensor_suffix}"
      unit_of_measurement: "H"
    total_sh_usage_hours:
      name: "${friendly_name} Total SH Operating Time${sensor_suffix}"
      unit_of_measurement: "H"
    days_since_install:
      name: "${friendly_name} Days Since Install${sensor_suffix}"
      accuracy_decimals: 0
    conn_status:
      id: conn_status
      name: "${friendly_name} Connection Status${sensor_suffix}"
    recirc_mode:
      id: recirc_mode
      name: "${friendly_name} Recirculation Mode${sensor_suffix}"
    boiler_active:
      id: boiler_active
      name: "${friendly_name} Boiler Active${sensor_suffix}"
    recirc_running:
      id: recirc_running
      name: "${friendly_name} Recirculation Running${sensor_suffix}"
    # this will be true if another NaviLink device is also connected
    other_navilink_installed:
      id: other_navilink_installed
      name: "${friendly_name} Other NaviLink Installed${sensor_suffix}"

  # HA-compatible gas sensors. These are disabled by default; enable them in
  # the ESPHome integration if you want Energy Dashboard compatibility.
  #
  # "Therms" is not a valid HA unit for device_class gas, so we provide CCF.
  # 1 CCF ~= 1.038 Therms.
  - platform: copy
    source_id: gas_total_therms
    name: "${friendly_name} Accumulated Gas Usage CCF${sensor_suffix}"
    unit_of_measurement: "CCF"
    device_class: gas
    state_class: total_increasing
    filters:
      - lambda: return x / 1.038;
    accuracy_decimals: 1
    disabled_by_default: true

  # Instantaneous gas usage in kW (power, not energy).
  # The legacy BTU sensor value is 1/10 of actual BTU/hr (see gas_current
  # comments above), so we correct by 10x and convert BTU/hr to kW.
  # 1 kW = 3412 BTU/hr.
  - platform: copy
    source_id: gas_current_btu
    name: "${friendly_name} Current Gas Usage kW${sensor_suffix}"
    unit_of_measurement: "kW"
    device_class: power
    state_class: measurement
    filters:
      - lambda: return x * 10.0 / 3412.0;
    accuracy_decimals: 1
    disabled_by_default: true
